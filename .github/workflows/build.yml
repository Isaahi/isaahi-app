name: Build EXE

on: [push]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build EXE
        run: npx electron-builder --win portable

      - name: Upload EXE
        uses: uses: actions/upload-artifact@v4
        with:
          name: isaahi-app
          path: dist/
